name: Tests

on:
  push

jobs:
  macos-tests:
    runs-on: macos-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Swift
      uses: SwiftyLab/setup-swift@latest

    - name: Run Swift tests
      run: swift test

  android-tests:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Run tests
      uses: skiptools/swift-android-action@v2